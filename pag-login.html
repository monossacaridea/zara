<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Zara</title>
  <link rel="stylesheet" href="pag-login.css">
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <a href="pag-menu.html" class="btn-menu">
        <img src="assets/icon-menu.png" alt="menu">
      </a>
      <h1 class="logo">ZARA</h1>
      <!-- Ícone da lupa → redireciona para pag-busca.html -->
      <button class="btn-search" onclick="window.location.href='pag-busca.html'">
        <img src="assets/icon-search.png" alt="search">
      </button>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">

      <!-- Seção: Brand Identity -->
      <section class="brand-section">
        <span class="brand-label">CONTA</span>
        <h1 class="brand-title">ZARA</h1>
      </section>

      <!-- Seção: Login Form -->
      <section class="login-section">
        <h2 class="form-title">INICIAR SESSÃO OU REGISTRAR-SE</h2>

        <form class="login-form" onsubmit="event.preventDefault(); alert('Login realizado com sucesso!'); window.location.href='pag-conta.html';">
          <div class="form-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="" required>
          </div>
          <button type="submit" class="btn-continue">CONTINUAR</button>
        </form>
      </section>

      <!-- Seção: Social Auth -->
      <section class="social-section">
        <h3 class="social-title">ACESSAR COM</h3>
        <div class="social-buttons">
          <button class="btn-apple" onclick="alert('Login com Apple')">
            <img src="assets/apple-icon.png" alt="Apple" class="social-icon">
            CONTINUAR COM APPLE
          </button>
          <button class="btn-google" onclick="alert('Login com Google')">
            <img src="assets/google-icon.png" alt="Google" class="social-icon">
            CONTINUAR COM GOOGLE
          </button>
        </div>
      </section>

      <!-- Seção: Legal Disclaimer -->
      <p class="legal-text">
        Ao fazer login com minha conta social, concordo em vincular minha conta de acordo com a
        <a href="#">Política de privacidade</a>
      </p>

      <!-- Seção: Imagem Editorial -->
      <section class="editorial-image">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqvaU_wb9au2OkCwX-7L5pv6dGQXeh6_zzRBsTSbF3Ptj7YoW9N9FgZuDD-gPkE9WXWap7paof4fYG_uONjam2wwllqt8SxKb4Q30WQrrYDyxOUy8P-wea4LUcg28d3U3B-orFI3Jz_cLSC2UnGNmQhxINw9RBunAfAy8-kejZoQqaTGo6DmafCqHvdTUyXlu0QmNfc17vj7fTLjtZ9xExARjJjHMCDPYZGYLM8N8xmZsXVXAKlPu_L-FwFI7E-6aLhAdL1uyeEw" alt="Editorial Fashion">
      </section>

    </main>

    <!-- NAVBAR -->
    <nav class="navbar">
      <!-- Ícone INÍCIO → redireciona para index.html -->
      <a href="index.html" class="nav-item">
        <img src="assets/icon-inicio.png" alt="Início" class="nav-icon">
        <span>INÍCIO</span>
      </a>
      <!-- Ícone BUSCAR → redireciona para pag-busca.html -->
      <a href="pag-busca.html" class="nav-item">
        <img src="assets/icon-buscar.png" alt="Buscar" class="nav-icon">
        <span>BUSCAR</span>
      </a>
      <a href="pag-carrinho.html" class="nav-item">
        <img src="assets/icon-carrinho.png" alt="Carrinho" class="nav-icon">
        <span>CARRINHO</span>
      </a>
      <a href="#" class="nav-item active">
        <img src="assets/icon-conta.png" alt="Conta" class="nav-icon">
        <span>CONTA</span>
      </a>
    </nav>

  </div>
  <script src="script.js"></script>
</body>
</html>
