<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zara</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="btn-menu"><img src="assets/icon-menu.png" alt="menu"></button>
      <h1 class="logo">ZARA</h1>
      <button class="btn-search"><img src="assets/icon-search-header.png" alt="search"></button>
    </div>

    <div class="content">
      <section class="hero-section">
        <img src="assets/hero-product.png" alt="Sobretudo" class="hero-image">
        <h2>SOBRETUDO ESTRUTURADO EM LÃ</h2>
      </section>

      <section class="products-section">
        <div class="product">
          <div class="product-image"></div>
          <h3>VESTIDO KNIT LIMITED</h3>
          <p>R$ 459,00</p>
        </div>
        <div class="product">
          <div class="product-image"></div>
          <h3>BOLSA COURO MINIMAL</h3>
          <p>R$ 899,00</p>
        </div>
      </section>

      <section class="bottom-section">
        <img src="assets/bottom-feature.png" alt="Nova coleção" class="bottom-image">
        <h2>NOVA COLEÇÃO ORIGINS</h2>
      </section>
    </div>

    <nav class="navbar">
      <a href="#" class="nav-item active">
        <img src="assets/icon-inicio.png" alt="Início" class="nav-icon">
        <span>INÍCIO</span>
      </a>
      <a href="#" class="nav-item">
        <img src="assets/icon-buscar.png" alt="Buscar" class="nav-icon">
        <span>BUSCAR</span>
      </a>
      <a href="#" class="nav-item">
        <img src="assets/icon-carrinho.png" alt="Carrinho" class="nav-icon">
        <span>CARRINHO</span>
      </a>
      <a href="#" class="nav-item">
        <img src="assets/icon-conta.png" alt="Conta" class="nav-icon">
        <span>CONTA</span>
      </a>
    </nav>
  </div>
</body>
</html>
